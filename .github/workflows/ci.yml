name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    name: Linting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      - name: Setup node
        uses: actions/setup-node@v7
        with:
          node-version: 24
          check-latest: true
          cache: yarn
      - name: Install deps
        run: yarn install
      - name: Build rules
        run: yarn build
      - name: Eslint check
        run: yarn lint

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [22, 24, 26]
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      - name: Setup node
        uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node }}
          check-latest: true
          cache: yarn
      - name: Install deps
        run: yarn install
      - name: Build rules
        run: yarn build
      - name: Test
        run: yarn test
